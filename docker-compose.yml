services:
  db:
    image: postgres:17-alpine
    container_name: music-social-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
      POSTGRES_DB: music_social
    ports:
      - "5432:5432"
    volumes:
      - music_social_pgdata:/var/lib/postgresql/data

volumes:
  music_social_pgdata:
